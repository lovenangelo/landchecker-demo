default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: landchecker

test:
  <<: *default
  database: landchecker_test

production:
  <<: *default
  database: landchecker_production
