services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: landchecker_user
      POSTGRES_PASSWORD: landchecker_pass
      POSTGRES_DB: landchecker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landchecker_user -d landchecker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: bin/rails server -b 0.0.0.0 -p 3001
    environment:
      DATABASE_URL: postgresql://landchecker_user:landchecker_pass@db:5432/landchecker
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
      DEVISE_JWT_SECRET_KEY: changeme_in_production
      RAILS_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
